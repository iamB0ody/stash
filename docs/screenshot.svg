<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
  <!-- Terminal window -->
  <rect width="680" height="540" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="680" height="38" rx="10" ry="10" fill="#313244"/>
  <rect y="28" width="680" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6.5" fill="#f38ba8"/>
  <circle cx="42" cy="19" r="6.5" fill="#f9e2af"/>
  <circle cx="62" cy="19" r="6.5" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="340" y="24" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" fill="#cdd6f4">stash</text>

  <!-- ════════ STASH PIXEL LOGO ════════ -->
  <!-- Each block is 8x8, gap between letters ~6px -->
  <!-- Color: #89dceb (cyan) -->
  <g fill="#89dceb" transform="translate(28, 52)">
    <!-- S -->
    <rect x="0" y="0" width="48" height="8"/>
    <rect x="0" y="0" width="8" height="32"/>
    <rect x="0" y="24" width="48" height="8"/>
    <rect x="40" y="24" width="8" height="32"/>
    <rect x="0" y="48" width="48" height="8"/>

    <!-- T -->
    <rect x="56" y="0" width="48" height="8"/>
    <rect x="76" y="0" width="8" height="56"/>

    <!-- A -->
    <rect x="112" y="0" width="48" height="8"/>
    <rect x="112" y="0" width="8" height="56"/>
    <rect x="152" y="0" width="8" height="56"/>
    <rect x="112" y="24" width="48" height="8"/>

    <!-- S -->
    <rect x="168" y="0" width="48" height="8"/>
    <rect x="168" y="0" width="8" height="32"/>
    <rect x="168" y="24" width="48" height="8"/>
    <rect x="208" y="24" width="8" height="32"/>
    <rect x="168" y="48" width="48" height="8"/>

    <!-- H -->
    <rect x="224" y="0" width="8" height="56"/>
    <rect x="264" y="0" width="8" height="56"/>
    <rect x="224" y="24" width="48" height="8"/>
  </g>

  <!-- ════════ Version box ════════ -->
  <g font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace" font-size="13">
    <rect x="28" y="124" width="290" height="42" rx="6" ry="6" fill="none" stroke="#585b70" stroke-width="1"/>
    <text x="173" y="142" text-anchor="middle">
      <tspan fill="#cdd6f4" font-weight="bold">Stash</tspan>
      <tspan fill="#6c7086"> v0.1.0</tspan>
    </text>
    <text x="173" y="158" text-anchor="middle" fill="#6c7086" font-size="12">Storage Cleaner for Developers</text>

    <!-- ════════ Disk info ════════ -->
    <!-- Data -->
    <text x="28" y="192" fill="#6c7086">›</text>
    <text x="42" y="192" fill="#cdd6f4" font-weight="bold"> Data</text>
    <text x="86" y="192" fill="#6c7086"> — </text>
    <text x="110" y="192" fill="#f38ba8" font-weight="bold">99% used</text>
    <text x="198" y="192" fill="#6c7086"> — 456.2 GB / 460.4 GB</text>

    <!-- SanDiskSSD -->
    <text x="28" y="212" fill="#6c7086">›</text>
    <text x="42" y="212" fill="#cdd6f4"> SanDiskSSD</text>
    <text x="138" y="212" fill="#6c7086"> — </text>
    <text x="162" y="212" fill="#a6e3a1" font-weight="bold">15% used</text>
    <text x="250" y="212" fill="#6c7086"> — 136.5 GB / 931.3 GB</text>

    <!-- Dia -->
    <text x="28" y="232" fill="#6c7086">›</text>
    <text x="42" y="232" fill="#cdd6f4"> Dia</text>
    <text x="76" y="232" fill="#6c7086"> — </text>
    <text x="100" y="232" fill="#f38ba8" font-weight="bold">100% used</text>
    <text x="198" y="232" fill="#6c7086"> — 1.1 GB / 1.1 GB</text>

    <!-- Kitto 1 -->
    <text x="28" y="252" fill="#6c7086">›</text>
    <text x="42" y="252" fill="#cdd6f4"> Kitto 1</text>
    <text x="110" y="252" fill="#6c7086"> — </text>
    <text x="134" y="252" fill="#89dceb" font-weight="bold">61% used</text>
    <text x="220" y="252" fill="#6c7086"> — 274.2 MB / 449.0 MB</text>

    <!-- Kitto -->
    <text x="28" y="272" fill="#6c7086">›</text>
    <text x="42" y="272" fill="#cdd6f4"> Kitto</text>
    <text x="98" y="272" fill="#6c7086"> — </text>
    <text x="122" y="272" fill="#89dceb" font-weight="bold">61% used</text>
    <text x="208" y="272" fill="#6c7086"> — 274.2 MB / 447.5 MB</text>

    <!-- Navigation hints -->
    <text x="28" y="296" fill="#6c7086" font-size="12">↓↑ Navigate  › Enter to select  Space to toggle  Ctrl+C to exit</text>

    <!-- ════════ Menu ════════ -->
    <text x="28" y="334" fill="#6c7086">│</text>

    <text x="28" y="354" fill="#cba6f7">◆</text>
    <text x="46" y="354" fill="#cdd6f4"> What would you like to do?</text>

    <text x="28" y="374" fill="#6c7086">│</text>
    <text x="46" y="374" fill="#a6e3a1"> ●</text>
    <text x="66" y="374" fill="#cdd6f4"> Scan Storage</text>
    <text x="180" y="374" fill="#6c7086"> (Analyze disk usage)</text>

    <text x="28" y="394" fill="#6c7086">│</text>
    <text x="46" y="394" fill="#6c7086"> ○ Quick Clean</text>

    <text x="28" y="414" fill="#6c7086">│</text>
    <text x="46" y="414" fill="#6c7086"> ○ Select &amp; Clean</text>

    <text x="28" y="434" fill="#6c7086">│</text>
    <text x="46" y="434" fill="#6c7086"> ○ Dev Tools</text>

    <text x="28" y="454" fill="#6c7086">│</text>
    <text x="46" y="454" fill="#6c7086"> ○ Exit</text>

    <text x="28" y="474" fill="#6c7086">└</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="28" y="486" width="8" height="16" fill="#cdd6f4" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
