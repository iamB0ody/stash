<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <!-- Terminal window -->
  <rect width="680" height="520" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="680" height="38" rx="10" ry="10" fill="#313244"/>
  <rect y="28" width="680" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6.5" fill="#f38ba8"/>
  <circle cx="42" cy="19" r="6.5" fill="#f9e2af"/>
  <circle cx="62" cy="19" r="6.5" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" fill="#cdd6f4">stash — Terminal</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace" font-size="13">

    <!-- STASH Logo - cyan -->
    <text x="24" y="72" fill="#89dceb">  ███████╗████████╗ █████╗ ███████╗██╗  ██╗</text>
    <text x="24" y="89" fill="#89dceb">  ██╔════╝╚══██╔══╝██╔══██╗██╔════╝██║  ██║</text>
    <text x="24" y="106" fill="#89dceb">  ███████╗   ██║   ███████║███████╗███████║</text>
    <text x="24" y="123" fill="#89dceb">  ╚════██║   ██║   ██╔══██║╚════██║██╔══██║</text>
    <text x="24" y="140" fill="#89dceb">  ███████║   ██║   ██║  ██║███████║██║  ██║</text>
    <text x="24" y="157" fill="#89dceb">  ╚══════╝   ╚═╝   ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝</text>

    <!-- Box -->
    <text x="24" y="185" fill="#6c7086">  ╭────────────────────────────────╮</text>
    <text x="24" y="202" fill="#6c7086">  │</text>
    <text x="120" y="202" fill="#cdd6f4" font-weight="bold">Stash</text>
    <text x="168" y="202" fill="#6c7086">v0.1.0</text>
    <text x="388" y="202" fill="#6c7086">│</text>
    <text x="24" y="219" fill="#6c7086">  │</text>
    <text x="72" y="219" fill="#6c7086">Storage Cleaner for Developers</text>
    <text x="388" y="219" fill="#6c7086">│</text>
    <text x="24" y="236" fill="#6c7086">  ╰────────────────────────────────╯</text>

    <!-- Disk info -->
    <text x="24" y="266" fill="#cdd6f4">  ❯ </text>
    <text x="60" y="266" fill="#cdd6f4" font-weight="bold">Data</text>
    <text x="100" y="266" fill="#6c7086"> — </text>
    <text x="124" y="266" fill="#f38ba8" font-weight="bold">99% used</text>
    <text x="220" y="266" fill="#6c7086"> — 456.2 GB / 460.4 GB</text>

    <text x="24" y="283" fill="#cdd6f4">  ❯ </text>
    <text x="60" y="283" fill="#cdd6f4">SanDiskSSD</text>
    <text x="158" y="283" fill="#6c7086"> — </text>
    <text x="182" y="283" fill="#a6e3a1" font-weight="bold">15% used</text>
    <text x="276" y="283" fill="#6c7086"> — 136.5 GB / 931.3 GB</text>

    <text x="24" y="310" fill="#6c7086">  ↓↑ Navigate  ❯ Enter to select  Space to toggle  Ctrl+C to exit</text>

    <!-- Menu -->
    <text x="24" y="340" fill="#6c7086">│</text>
    <text x="24" y="357" fill="#cba6f7">◆</text>
    <text x="42" y="357" fill="#cdd6f4">  What would you like to do?</text>
    <text x="24" y="374" fill="#6c7086">│</text>
    <text x="42" y="374" fill="#a6e3a1">  ●</text>
    <text x="72" y="374" fill="#cdd6f4"> Scan Storage</text>
    <text x="196" y="374" fill="#6c7086">(Analyze disk usage)</text>

    <text x="24" y="391" fill="#6c7086">│</text>
    <text x="42" y="391" fill="#6c7086">  ○</text>
    <text x="72" y="391" fill="#6c7086"> Quick Clean</text>

    <text x="24" y="408" fill="#6c7086">│</text>
    <text x="42" y="408" fill="#6c7086">  ○</text>
    <text x="72" y="408" fill="#6c7086"> Select &amp; Clean</text>

    <text x="24" y="425" fill="#6c7086">│</text>
    <text x="42" y="425" fill="#6c7086">  ○</text>
    <text x="72" y="425" fill="#6c7086"> Dev Tools</text>

    <text x="24" y="442" fill="#6c7086">│</text>
    <text x="42" y="442" fill="#6c7086">  ○</text>
    <text x="72" y="442" fill="#6c7086"> Exit</text>

    <text x="24" y="459" fill="#6c7086">└</text>

    <!-- Cursor -->
    <rect x="24" y="470" width="8" height="16" fill="#cdd6f4" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
